services:
  db:
    image: postgres:16-alpine
    container_name: clearledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clearledger
      POSTGRES_PASSWORD: clearledger
      POSTGRES_DB: clearledger
    ports:
      - "54329:5432"
    volumes:
      - clearledger-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearledger -d clearledger"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clearledger-postgres-data:
