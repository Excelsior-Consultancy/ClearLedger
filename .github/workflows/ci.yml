name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  migrate:
    name: Run migrations
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: Migrate dev database
        if: github.ref == 'refs/heads/develop'
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.DEV_POSTGRES_PRISMA_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.DEV_POSTGRES_URL_NON_POOLING }}
        run: npx prisma migrate deploy

      - name: Seed dev database
        if: github.ref == 'refs/heads/develop'
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.DEV_POSTGRES_PRISMA_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.DEV_POSTGRES_URL_NON_POOLING }}
        run: npx prisma db seed

      - name: Migrate prod database
        if: github.ref == 'refs/heads/main'
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.PROD_POSTGRES_PRISMA_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.PROD_POSTGRES_URL_NON_POOLING }}
        run: npx prisma migrate deploy
